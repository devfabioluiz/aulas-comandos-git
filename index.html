<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <header>
        <nav class="navbar navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">
                    Projeto
                </a>
            </div>
        </nav>
    </header>

    <main class="container mt-5 flex-grow-1">

        
        <div class="text-center mb-5">
            <h1>Bem-vindo ao Sistema</h1>
            <p class="text-muted">Gerencie informações de forma simples e eficiente</p>
        </div>

        
        <div class="row g-4">

            <div class="col-md-4">
                <div class="card p-4 shadow-sm h-100">
                    <h5>📚 Livros</h5>
                    <p>Gerencie seu acervo de livros.</p>
                    <button class="btn btn-primary">Acessar</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 shadow-sm h-100">
                    <h5>👤 Usuários</h5>
                    <p>Controle os usuários do sistema.</p>
                    <button class="btn btn-success">Gerenciar</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 shadow-sm h-100">
                    <h5>⚙️ Configurações</h5>
                    <p>Ajuste preferências do sistema.</p>
                    <button class="btn btn-secondary">Configurar</button>
                </div>
            </div>

        </div>

    </main>

    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">João Ramos</p>
    </footer>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</body>

</html>
